{% extends "base.html" %}
{% block title %}Hapus User{% endblock %}
{% block content %}
<div class="page-head">
  <div>
    <a href="{% url 'siswa_list' %}" class="back">← Kelola User</a>
    <h1>Hapus User</h1>
  </div>
</div>
<form method="post" class="form-card" style="max-width:560px">{% csrf_token %}
  <div>Anda akan menghapus:</div>
  <div style="font-size:18px;font-weight:700;margin:6px 0">{{ s.nama }}</div>
  <div style="color:var(--muted);font-size:13px">Data peminjaman terkait user ini akan ikut terhapus (ON DELETE CASCADE).</div>
  <div class="form-actions">
    <a href="{% url 'siswa_list' %}" class="btn btn-ghost">Batal</a>
    <button class="btn btn-danger">Hapus</button>
  </div>
</form>
{% endblock %}
